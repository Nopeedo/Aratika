name: Refresh economic indicators

# Rebuilds src/constants/economic-data.ts from World Bank Open Data (no API key).
# Monthly, not daily: these are quarterly official series, and the generated file
# stamps a retrieval date — running it daily would produce a pointless commit
# every day even when no figure moved.
on:
  schedule:
    - cron: '0 3 1 * *'    # 3pm NZST on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci

      - name: Fetch economic series
        run: node scripts/fetch-economic-data.mjs

      - name: Commit only if the data actually changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain src/constants)" ]; then
            git add src/constants
            git commit -m "Auto-refresh: economic indicators from World Bank Open Data"
            git push
            echo "Committed refreshed economic data."
          else
            echo "No change in economic data — nothing to commit."
          fi
