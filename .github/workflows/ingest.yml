name: Daily content ingest

# Pulls from the official Parliament/PCO APIs once a day and stages new/changed
# items into Supabase as 'pending' for editorial review. Manual run also enabled.
on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC ≈ 7–8am NZ (after overnight); adjust as needed
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Run ingest
        run: node scripts/ingest.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PARLIAMENT_API_KEY: ${{ secrets.PARLIAMENT_API_KEY }}
          LEGISLATION_RSS_URLS: ${{ secrets.LEGISLATION_RSS_URLS }}

      # Step 2 of the reader. Ingest alone only stages RAW bills, which stay
      # invisible to /editor (it hides un-enriched legislation as "pending
      # enrichment", not "pending review"). Without this step bills accumulate
      # silently and never reach /legislation — 109 had piled up before it was
      # added. Runs on Gemini's free tier; falls back to Anthropic if that key
      # is the only one set.
      - name: Enrich new bills
        run: node scripts/enrich-bills.mjs --all
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # The ingest feed doesn't carry the member in charge, the official bill page,
      # or the submission window — bills-54.ts (Parliament API) does. Without this
      # join a new bill reaches the reader with no one accountable named and no way
      # to lodge a submission. Deterministic, no AI, so it is cheap to run daily.
      - name: Backfill bill member in charge + submission details
        run: node scripts/backfill-bill-members.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
